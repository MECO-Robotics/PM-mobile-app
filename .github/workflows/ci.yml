name: CI

on:
  workflow_dispatch:
  pull_request:
    branches:
      - development
      - main
  push:
    branches:
      - development
      - main
      - "feature/**"
      - "fix/**"
      - "hotfix/**"
    paths:
      - "AGENTS.md"
      - ".github/workflows/ci.yml"
      - ".github/workflows/mobile-release.yml"
      - "app.json"
      - "eas.json"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - "eslint.config.js"
      - "App.tsx"
      - "index.ts"
      - "src/**"
      - "assets/**"
      - "skills/**"
      - "scripts/**"
      - "script/**"

permissions:
  contents: read

concurrency:
  group: meco-mission-control-mobile-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  branch-model:
    name: branch-model
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR branch strategy
        env:
          BASE_REF: ${{ github.base_ref }}
          HEAD_REF: ${{ github.head_ref }}
        run: |
          set -euo pipefail

          if [[ "$BASE_REF" == "development" ]]; then
            if [[ "$HEAD_REF" =~ ^(feature|fix|hotfix)/ ]]; then
              exit 0
            fi
            echo "PRs into development must come from feature/*, fix/*, or hotfix/* branches." >&2
            exit 1
          fi

          if [[ "$BASE_REF" == "main" ]]; then
            if [[ "$HEAD_REF" == "development" || "$HEAD_REF" =~ ^hotfix/ ]]; then
              exit 0
            fi
            echo "PRs into main must come from development or hotfix/* branches." >&2
            exit 1
          fi

          echo "Unexpected PR base branch: $BASE_REF" >&2
          exit 1

  ci-validate:
    name: ci-validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run verify
        env:
          GH_TOKEN: ${{ github.token }}
          PLATFORM_BOOTSTRAP_CONTRACT_BRANCH: ${{ github.base_ref || 'development' }}
          PLATFORM_BOOTSTRAP_CONTRACT_SOURCE_PATH: contracts/platform/bootstrap/v1/contract.json
          CI: true
        run: npm run verify

  snapshot-validate:
    name: snapshot-validate
    needs: ci-validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Render production-like Expo config
        run: npx expo config --type public --json > snapshot-expo-public-config.json

      - name: Build sanitized release snapshot
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p snapshot
          mv snapshot-expo-public-config.json snapshot/expo-public-config.json
          node <<'NODE'
          const fs = require('node:fs');

          const payload = {
            repository: process.env.GITHUB_REPOSITORY,
            commit: process.env.GITHUB_SHA,
            ref: process.env.GITHUB_REF,
            generatedAtUtc: new Date().toISOString(),
            validations: ['npm run typecheck', 'npm run lint', 'npx expo config --type public --json'],
            artifacts: ['app.json', 'eas.json', 'snapshot/expo-public-config.json'],
            releaseTarget: 'github-releases',
          };

          fs.writeFileSync('snapshot/manifest.json', `${JSON.stringify(payload, null, 2)}\n`);
          NODE
          tar -czf snapshot/mobile-release-snapshot.tgz app.json eas.json package.json package-lock.json snapshot/expo-public-config.json snapshot/manifest.json

      - name: Upload sanitized snapshot artifact
        uses: actions/upload-artifact@v4
        with:
          name: mobile-release-snapshot-${{ github.sha }}
          path: |
            snapshot/manifest.json
            snapshot/expo-public-config.json
            snapshot/mobile-release-snapshot.tgz
          if-no-files-found: error

  cross-repo-production-gate:
    name: cross-repo-production-gate
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    needs:
      - ci-validate
      - snapshot-validate
    runs-on: ubuntu-latest
    steps:
      - name: Validate development integration health across all repos
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          node <<'NODE'
          const owner = 'MECO-Robotics';
          const repos = ['meco-mission-control-web', 'meco-mission-control-platform', 'meco-mission-control-mobile'];
          const requiredChecks = {
            'meco-mission-control-web': ['ci-validate', 'snapshot-validate'],
            'meco-mission-control-platform': ['ci-validate', 'snapshot-validate'],
            'meco-mission-control-mobile': ['ci-validate', 'snapshot-validate'],
          };

          const token = process.env.GH_TOKEN;
          if (!token) {
            throw new Error('github.token is required for cross-repo validation.');
          }

          async function gh(path) {
            const response = await fetch(`https://api.github.com${path}`, {
              headers: {
                Authorization: `Bearer ${token}`,
                Accept: 'application/vnd.github+json',
                'X-GitHub-Api-Version': '2022-11-28',
              },
            });

            if (!response.ok) {
              const body = await response.text();
              throw new Error(`GitHub API ${path} failed (${response.status}): ${body}`);
            }

            return response.json();
          }

          for (const repo of repos) {
            const branch = await gh(`/repos/${owner}/${repo}/branches/development`);
            const sha = branch?.commit?.sha;
            if (!sha) {
              throw new Error(`Could not resolve development HEAD SHA for ${owner}/${repo}.`);
            }

            const checks = await gh(`/repos/${owner}/${repo}/commits/${sha}/check-runs?per_page=100`);
            const successful = new Set(
              (checks.check_runs ?? [])
                .filter((check) => check.conclusion === 'success')
                .map((check) => check.name),
            );

            for (const checkName of requiredChecks[repo]) {
              if (!successful.has(checkName)) {
                throw new Error(
                  `${owner}/${repo}@${sha} is missing successful check: ${checkName}.`,
                );
              }
            }

            console.log(`Validated ${owner}/${repo}@${sha}`);
          }
          NODE

  merge-requirements:
    name: merge-requirements
    if: always()
    needs:
      - branch-model
      - ci-validate
      - snapshot-validate
      - cross-repo-production-gate
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate dynamic merge requirements
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
          BRANCH_MODEL_RESULT: ${{ needs.branch-model.result }}
          CI_VALIDATE_RESULT: ${{ needs.ci-validate.result }}
          SNAPSHOT_VALIDATE_RESULT: ${{ needs.snapshot-validate.result }}
          CROSS_REPO_PRODUCTION_GATE_RESULT: ${{ needs.cross-repo-production-gate.result }}
        run: |
          node <<'NODE'
          const eventName = process.env.EVENT_NAME;
          const baseRef = process.env.BASE_REF;

          if (eventName !== 'pull_request') {
            console.log(`merge-requirements is enforced for pull_request events; current event is ${eventName}.`);
            process.exit(0);
          }

          const requiredChecks = [
            ['branch-model', process.env.BRANCH_MODEL_RESULT],
            ['ci-validate', process.env.CI_VALIDATE_RESULT],
            ['snapshot-validate', process.env.SNAPSHOT_VALIDATE_RESULT],
          ];

          if (baseRef === 'main') {
            requiredChecks.push(['cross-repo-production-gate', process.env.CROSS_REPO_PRODUCTION_GATE_RESULT]);
          }

          const failures = requiredChecks.filter(([, result]) => result !== 'success');

          if (failures.length > 0) {
            const summary = failures.map(([name, result]) => `${name}=${result}`).join(', ');
            throw new Error(`Required merge checks did not pass: ${summary}`);
          }

          const enforced = requiredChecks.map(([name]) => name).join(', ');
          console.log(`Required merge checks passed for ${baseRef}: ${enforced}`);
          NODE
